{{/*
Parent chart template - demonstrates broken vs fixed helpers.
Uses Secrets since Bitnami's common.secrets.key is designed for secret key lookup.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: parent-chart-output
type: Opaque
stringData:
  # BROKEN (custom re-implementation): outputs "%!s(<nil>)" when keyMapping.password is null
  broken_password_key: {{ include "broken.secrets.key" (dict "existingSecret" .Values.existingSecret "key" "password") | quote }}

  # BROKEN (actual Bitnami common.secrets.key): same nil issue
  bitnami_password_key: {{ include "common.secrets.key" (dict "existingSecret" .Values.existingSecret "key" "password") | quote }}

  # FIXED: correctly falls back to default key name
  fixed_password_key: {{ include "fixed.secrets.key" (dict "existingSecret" .Values.existingSecret "key" "password") | quote }}

  # Debug: show keyMapping after value merge
  keyMapping_debug: {{ (.Values.existingSecret).keyMapping | toJson | quote }}
  existingSecret_debug: {{ .Values.existingSecret | toJson | quote }}
---
{{/*
Job demonstrating the actual failure - invalid subPath causes directory mount.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: subpath-demo-job
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: demo
          image: busybox
          command: ["cat", "/credentials/ldapread.secret"]
          volumeMounts:
            - mountPath: "/credentials/ldapread.secret"
              name: "secret-volume"
              subPath: {{ include "broken.secrets.key" (dict "existingSecret" .Values.existingSecret "key" "password") | quote }}
      volumes:
        - name: secret-volume
          secret:
            secretName: my-secret
